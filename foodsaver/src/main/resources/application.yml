app:
  media:
    root: C:/foodback_data
    path:
      avatars: C:/foodback_data/avatars
      offers: C:/foodback_data/offers
      products: C:/foodback_data/products
      enterprises: C:/foodback_data/enterprises
  firebase:
    admin-sdk-path: firebase/firebase-admin-sdk.json

spring:
  application:
    name: foodback
    version: 1.0.0

  datasource:
    url: jdbc:postgresql://localhost:5432/foodback_db
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 1
      minimum-idle: 0
      idle-timeout: 10000
      max-lifetime: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update #create-drop  // for test debugging
    generate-ddl: true
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

  tomcat:
    connection-timeout: 60000

  jackson:
    default-setter-info:
      null-value: SKIP

    deserialization:
      FAIL_ON_UNKNOWN_PROPERTIES: false
      ACCEPT_SINGLE_VALUE_AS_ARRAY: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: andreev.arsenij2020@gmail.com
    password: qcqe imda tqpt fglm

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id:
              web: ${SPRING_GOOGLE_CLIENT_ID_WEB}
              desktop: ${SPRING_GOOGLE_CLIENT_ID_DESKTOP}
              android: ${SPRING_GOOGLE_CLIENT_ID_ANDROID}
            client-secret: ${SPRING_GOOGLE_CLIENT_SECRET}
            scope: openid, email, profile
          provider:
            issuer-uri: https://accounts.google.com

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

